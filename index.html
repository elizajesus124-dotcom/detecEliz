<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DetecEliz PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

#reader {
    width: 300px;
    margin: auto;
}
</style>
</head>

<body>

<h1>🔧 DetecEliz PRO</h1>
<h3>Scanner + Diagnóstico Inteligente</h3>

<button onclick="iniciarCamara()">📷 Escanear</button>
<button onclick="detenerCamara()">⛔ Detener</button>

<div id="reader"></div>

<h2 id="resultado"></h2>

<script>
let html5QrCode;

function iniciarCamara() {
    if (html5QrCode && html5QrCode._isScanning) return;

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            document.getElementById("resultado").innerText =
                "Código detectado: " + decodedText;

            diagnosticar();
        }
    );
}

function detenerCamara() {
    if (html5QrCode) {
        html5QrCode.stop();
    }
}

function diagnosticar() {
    let presion = prompt("Ingrese presión (bar):");
    let estado = prompt("Estado: pulveriza / gotea / chorrea");

    presion = parseInt(presion);

    let resultado = "";

    if (presion < 180) {
        resultado = "❌ Presión baja - desgaste interno";
    } else if (presion > 250) {
        resultado = "⚠️ Presión alta - posible obstrucción";
    } else {
        if (estado === "pulveriza") {
            resultado = "✅ Inyector OK";
        } else if (estado === "gotea") {
            resultado = "⚠️ Fuga interna";
        } else if (estado === "chorrea") {
            resultado = "❌ Daño severo";
        } else {
            resultado = "❓ Revisar datos";
        }
    }

    document.getElementById("resultado").innerText = resultado;
}
</script>

</body>
</html>
