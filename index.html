<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>detecEliz IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; text-align:center;">

  <h1>🚀 detecEliz IA</h1>
  <p>Sistema inteligente de diagnóstico diesel</p>

  <button onclick="activarCamara()" style="padding:10px; font-size:18px;">
    Activar cámara
  </button>

  <video id="video" width="300" autoplay style="margin-top:20px;"></video>
  <button onclick="diagnosticar()" style="margin-top:15px; padding:10px; font-size:18px;">
Diagnosticar IA
</button>

<p id="resultado" style="margin-top:20px;"></p>
  <script>
    async function activarCamara() {
    const video = document.getElementById("video");

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment" // cámara trasera
            }
        });

        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();

    } catch (error) {
        alert("Error al acceder a la cámara");
        console.error(error);
    }
}
    function diagnosticar() {
    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "🔍 Analizando...";

    setTimeout(() => {
        resultado.innerHTML = "⚠️ Posible falla: Inyector obstruido<br>🔧 Recomendación: Limpieza o reemplazo";
    }, 2000);
}
  </script>

</body>
</html>
